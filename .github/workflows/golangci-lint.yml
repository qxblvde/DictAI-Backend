name: golangci-lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  detect-modules:
    name: Detect go.mod modules
    runs-on: ubuntu-latest
    outputs:
      list: ${{ steps.modules.outputs.list }}
    steps:
      - uses: actions/checkout@v5
      - name: Find go.mod directories with Go files
        id: modules
        run: |
          set -e
          find . -type f -name 'go.mod' -not -path './vendor/*' |
          while read modfile; do
            moddir=$(dirname "$modfile")
            if find "$moddir" -type f -name '*.go' -not -path '*/vendor/*' | grep -q .; then
              echo "$moddir"
            fi
          done | jq -R -s -c 'split("\n") | map(select(length > 0))' > modules.json
          echo "list=$(cat modules.json)" >> $GITHUB_OUTPUT

  golangci-lint:
    name: golangci-lint
    needs: detect-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.list) }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Run golangci-lint in ${{ matrix.module }}
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          working-directory: ${{ matrix.module }}
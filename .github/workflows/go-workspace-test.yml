name: Go Tests - Workspace tests

'on':
  push:
  pull_request:

jobs:
  test:
    name: Test Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        working-directory: ./services/workspace-service
        run: |
          go mod download
          go test ./... -v
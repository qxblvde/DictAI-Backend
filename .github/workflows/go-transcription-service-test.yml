name: Go Tests — Transcription Service

on:
  push:
  pull_request:

jobs:
  test:
    name: Test Transcription Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/transcription-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tooling
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@latest || true

      - name: Run tests
        run: go test ./... -v

---
name: Go Tests — Api Gateway tests

'on':
  push:
  pull_request:

jobs:
  test:
    name: Test Api Gateway
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: >
            ${{ runner.os }}-go-${{
            hashFiles('services/gateway/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tooling
        run: |
          go install \
          google.golang.org/protobuf/cmd/protoc-gen-go@latest || true

      - name: Run tests
        run: go test ./... -v
